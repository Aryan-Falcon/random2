<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Runner</title>
<style>
body{
    margin:0;
    background:#000;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
    overflow:hidden;
}
h1{margin:10px;}
textarea{
    width:80%;
    max-width:500px;
    height:70px;
    border-radius:10px;
    border:none;
    padding:10px;
    resize:none;
}
button{
    margin:6px;
    padding:10px 20px;
    border-radius:20px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(45deg,#00f5ff,#7b2ff7);
    color:white;
}
canvas{
    display:block;
    margin:0 auto;
    background:linear-gradient(#111,#000);
    touch-action:none;
}
#result{
    font-size:2rem;
    opacity:0;
    transition:opacity 1s ease;
}
</style>
</head>
<body>

<h1>🚀 Vault Runner</h1>

<textarea id="itemInput" placeholder="Enter items separated by commas..."></textarea><br>
<button onclick="saveList()">Save List</button>
<button onclick="startGame()">Start Run</button>

<canvas id="game"></canvas>
<div id="result"></div>

<script>
let items=[];
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight*0.55;
}
resize();
window.onresize=resize;

window.onload=()=>{
    const saved=localStorage.getItem("runnerItems");
    if(saved){
        items=JSON.parse(saved);
        document.getElementById("itemInput").value=items.join(", ");
    }
};

function saveList(){
    const input=document.getElementById("itemInput").value;
    items=input.split(",").map(i=>i.trim()).filter(i=>i);
    if(items.length===0) return alert("Enter at least one item.");
    localStorage.setItem("runnerItems",JSON.stringify(items));
    alert("List saved.");
}

let player,gravity=0.7,ground,obstacles=[],speed,timeSurvived,playing;

function startGame(){
    if(items.length===0) return alert("Save your list first.");
    document.getElementById("result").style.opacity=0;
    ground=canvas.height-60;
    player={x:120,y:ground-40,w:40,h:40,vy:0,jumping:false};
    obstacles=[];
    speed=6;
    timeSurvived=0;
    playing=true;
    spawnObstacle();
    gameLoop();
}

function spawnObstacle(){
    let height=30+Math.random()*40;
    obstacles.push({
        x:canvas.width+50,
        y:ground-height,
        w:30+Math.random()*20,
        h:height
    });
    setTimeout(spawnObstacle,1000+Math.random()*800);
}

function gameLoop(){
    if(!playing) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ground
    ctx.fillStyle="#222";
    ctx.fillRect(0,ground,canvas.width,60);

    // player physics
    player.vy+=gravity;
    player.y+=player.vy;
    if(player.y+player.h>ground){
        player.y=ground-player.h;
        player.vy=0;
        player.jumping=false;
    }

    // draw player
    ctx.fillStyle="#00f5ff";
    ctx.shadowBlur=20;
    ctx.shadowColor="#00f5ff";
    ctx.fillRect(player.x,player.y,player.w,player.h);
    ctx.shadowBlur=0;

    // obstacles
    ctx.fillStyle="#ff3b3b";
    obstacles.forEach(o=>{
        o.x-=speed;
        ctx.beginPath();
        ctx.moveTo(o.x,o.y+o.h);
        ctx.lineTo(o.x+o.w/2,o.y);
        ctx.lineTo(o.x+o.w,o.y+o.h);
        ctx.closePath();
        ctx.fill();

        // collision
        if(player.x<o.x+o.w &&
           player.x+player.w>o.x &&
           player.y<o.y+o.h &&
           player.y+player.h>o.y){
            explode();
        }
    });

    obstacles=obstacles.filter(o=>o.x+o.w>0);

    timeSurvived+=1/60;
    speed+=0.001;

    // progress bar
    let progress=Math.min(timeSurvived/20,1);
    ctx.fillStyle="#00ff88";
    ctx.fillRect(0,10,canvas.width*progress,10);

    if(progress>=1){
        win();
        return;
    }

    requestAnimationFrame(gameLoop);
}

function jump(){
    if(!player.jumping && playing){
        player.vy=-14;
        player.jumping=true;
    }
}

function explode(){
    playing=false;
    for(let i=0;i<30;i++){
        ctx.fillStyle="orange";
        ctx.fillRect(
            player.x+Math.random()*40,
            player.y+Math.random()*40,
            4,4
        );
    }
    setTimeout(startGame,1000);
}

function win(){
    playing=false;
    let randomItem=items[Math.floor(Math.random()*items.length)];
    let result=document.getElementById("result");
    result.innerText="✨ "+randomItem+" ✨";
    result.style.opacity=1;
}

canvas.addEventListener("click",jump);
canvas.addEventListener("touchstart",e=>{
    e.preventDefault();
    jump();
},{passive:false});
</script>

</body>
</html>
