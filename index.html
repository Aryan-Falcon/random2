<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Runner v3</title>
<style>
body{
    margin:0;
    background:#000;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
    overflow:hidden;
}
h1{margin:10px;}
textarea{
    width:80%;
    max-width:500px;
    height:70px;
    border-radius:10px;
    border:none;
    padding:10px;
    resize:none;
}
button{
    margin:6px;
    padding:10px 20px;
    border-radius:20px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(45deg,#00f5ff,#7b2ff7);
    color:white;
}
canvas{
    display:block;
    margin:0 auto;
    background:linear-gradient(#111,#000);
    touch-action:none;
}
#result{
    font-size:2rem;
    opacity:0;
    transition:opacity 1s ease;
}
</style>
</head>
<body>

<h1>🚀 Vault Runner v3</h1>

<textarea id="itemInput" placeholder="Enter items separated by commas..."></textarea><br>
<button onclick="saveList()">Save List</button>
<button onclick="startGame()">Start Run</button>

<canvas id="game"></canvas>
<div id="result"></div>

<script>
let items=[];
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight*0.55;
}
resize();
window.onresize=resize;

window.onload=()=>{
    const saved=localStorage.getItem("runnerItemsV3");
    if(saved){
        items=JSON.parse(saved);
        document.getElementById("itemInput").value=items.join(", ");
    }
};

function saveList(){
    const input=document.getElementById("itemInput").value;
    items=input.split(",").map(i=>i.trim()).filter(i=>i);
    if(items.length===0) return alert("Enter at least one item.");
    localStorage.setItem("runnerItemsV3",JSON.stringify(items));
    alert("List saved.");
}

let player,ground,speed,worldX,obstacles,finishX,checkpointX,playing;
let jumpBuffer=0;
let coyoteTime=0;

function startGame(){
    if(items.length===0) return alert("Save your list first.");

    document.getElementById("result").style.opacity=0;

    ground=canvas.height-100;
    player={
        x:150,
        y:ground-40,
        w:40,
        h:40,
        vy:0,
        rotation:0,
        onGround:true
    };

    speed=5.5;
    worldX=0;
    playing=true;
    jumpBuffer=0;
    coyoteTime=0;

    generateLevel();
    gameLoop();
}

function generateLevel(){
    obstacles=[];
    let x=700;
    const levelLength=7000;

    while(x<levelLength){
        let pattern=Math.random();

        if(pattern<0.6){
            obstacles.push({x:x,width:40,height:40});
            x+=320; // large safe landing
        }else{
            obstacles.push({x:x,width:40,height:40});
            obstacles.push({x:x+55,width:40,height:40});
            x+=360; // larger landing after double
        }
    }

    checkpointX=levelLength/2;
    finishX=levelLength+200;
}

function gameLoop(){
    if(!playing) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    worldX+=speed;

    ctx.fillStyle="#222";
    ctx.fillRect(0,ground,canvas.width,100);

    // checkpoint marker
    let cpScreen=checkpointX-worldX;
    if(cpScreen>0 && cpScreen<canvas.width){
        ctx.fillStyle="#ffaa00";
        ctx.fillRect(cpScreen,ground-60,10,60);
    }

    // finish portal
    let portalX=finishX-worldX;
    if(portalX<canvas.width){
        ctx.fillStyle="#00ff88";
        ctx.beginPath();
        ctx.arc(portalX,ground-40,30,0,Math.PI*2);
        ctx.fill();
    }

    // physics
    player.vy+=0.75;
    player.y+=player.vy;

    if(player.y+player.h>=ground){
        player.y=ground-player.h;
        player.vy=0;
        player.onGround=true;
        coyoteTime=8;
    }else{
        player.onGround=false;
        coyoteTime--;
    }

    if(jumpBuffer>0){
        if(player.onGround || coyoteTime>0){
            player.vy=-14;
            player.onGround=false;
            jumpBuffer=0;
        }
        jumpBuffer--;
    }

    // rotation like GD
    if(!player.onGround){
        player.rotation+=0.15;
    }else{
        player.rotation=0;
    }

    // draw player
    ctx.save();
    ctx.translate(player.x+player.w/2,player.y+player.h/2);
    ctx.rotate(player.rotation);
    ctx.fillStyle="#00f5ff";
    ctx.fillRect(-20,-20,40,40);
    ctx.restore();

    // draw obstacles
    ctx.fillStyle="#ff3b3b";
    obstacles.forEach(o=>{
        let screenX=o.x-worldX;
        if(screenX>-50 && screenX<canvas.width+50){
            ctx.beginPath();
            ctx.moveTo(screenX,ground);
            ctx.lineTo(screenX+o.width/2,ground-o.height);
            ctx.lineTo(screenX+o.width,ground);
            ctx.closePath();
            ctx.fill();

            if(player.x<screenX+o.width &&
               player.x+player.w>screenX &&
               player.y<ground &&
               player.y+player.h>ground-o.height){
                death();
            }
        }
    });

    if(player.x+player.w>portalX-20){
        win();
        return;
    }

    requestAnimationFrame(gameLoop);
}

function jump(){
    jumpBuffer=8; // allows buffered input
}

function death(){
    playing=false;

    if(worldX<checkpointX){
        setTimeout(startGame,600);
    }else{
        worldX=checkpointX-200;
        player.y=ground-40;
        player.vy=0;
        playing=true;
        requestAnimationFrame(gameLoop);
    }
}

function win(){
    playing=false;
    let randomItem=items[Math.floor(Math.random()*items.length)];
    let result=document.getElementById("result");
    result.innerText="✨ "+randomItem+" ✨";
    result.style.opacity=1;
}

canvas.addEventListener("click",jump);
canvas.addEventListener("touchstart",e=>{
    e.preventDefault();
    jump();
},{passive:false});
</script>

</body>
</html>
