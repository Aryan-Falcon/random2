<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Runner v4</title>
<style>
body{
    margin:0;
    background:#000;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
    overflow:hidden;
}
h1{margin:10px;}
textarea{
    width:80%;
    max-width:500px;
    height:70px;
    border-radius:10px;
    border:none;
    padding:10px;
    resize:none;
}
button{
    margin:6px;
    padding:10px 20px;
    border-radius:20px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(45deg,#00f5ff,#7b2ff7);
    color:white;
}
canvas{
    display:block;
    margin:0 auto;
    background:linear-gradient(#111,#000);
    touch-action:none;
}
#result{
    font-size:2rem;
    opacity:0;
    transition:opacity 1s ease;
}
</style>
</head>
<body>

<h1>🚀 Vault Runner v4</h1>

<textarea id="itemInput" placeholder="Enter items separated by commas..."></textarea><br>
<button onclick="saveList()">Save List</button>
<button onclick="startGame()">Start Run</button>

<canvas id="game"></canvas>
<div id="result"></div>

<script>
let items=[];
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight*0.55;
}
resize();
window.onresize=resize;

window.onload=()=>{
    const saved=localStorage.getItem("runnerItemsV4");
    if(saved){
        items=JSON.parse(saved);
        document.getElementById("itemInput").value=items.join(", ");
    }
};

function saveList(){
    const input=document.getElementById("itemInput").value;
    items=input.split(",").map(i=>i.trim()).filter(i=>i);
    if(items.length===0) return alert("Enter at least one item.");
    localStorage.setItem("runnerItemsV4",JSON.stringify(items));
    alert("List saved.");
}

let player,worldX,speed,playing;
let platforms=[],spikes=[];
let checkpointX,finishX;
let jumpBuffer=0,coyoteTime=0;

function startGame(){
    if(items.length===0) return alert("Save list first.");

    document.getElementById("result").style.opacity=0;

    speed=5;
    worldX=0;
    playing=true;
    jumpBuffer=0;
    coyoteTime=0;

    player={
        x:150,
        y:300,
        w:40,
        h:40,
        vy:0,
        rotation:0,
        onGround:false
    };

    generateLevel();
    gameLoop();
}

function generateLevel(){
    platforms=[];
    spikes=[];
    let x=0;
    const levelLength=6000;
    const baseY=canvas.height-120;

    while(x<levelLength){
        let width=300+Math.random()*150;
        let height=baseY - (Math.random()<0.3 ? 60 : 0);

        platforms.push({x:x,y:height,w:width,h:20});

        if(Math.random()<0.6){
            let spikeCount=Math.random()<0.5?1:2;
            for(let i=0;i<spikeCount;i++){
                spikes.push({
                    x:x+150+i*45,
                    y:height,
                    size:40
                });
            }
        }

        x+=width+120;
    }

    checkpointX=levelLength/2;
    finishX=levelLength+200;
}

function gameLoop(){
    if(!playing) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    worldX+=speed;

    player.vy+=0.8;
    player.y+=player.vy;
    player.onGround=false;

    platforms.forEach(p=>{
        let screenX=p.x-worldX;

        if(screenX>-p.w && screenX<canvas.width){
            ctx.fillStyle="#222";
            ctx.fillRect(screenX,p.y,p.w,p.h);

            if(player.x+player.w>screenX &&
               player.x<screenX+p.w &&
               player.y+player.h>p.y &&
               player.y+player.h<p.y+20 &&
               player.vy>=0){
                player.y=p.y-player.h;
                player.vy=0;
                player.onGround=true;
                coyoteTime=8;
            }
        }
    });

    if(!player.onGround) coyoteTime--;

    if(jumpBuffer>0){
        if(player.onGround || coyoteTime>0){
            player.vy=-14;
            jumpBuffer=0;
        }
        jumpBuffer--;
    }

    if(!player.onGround){
        player.rotation+=0.15;
    }else{
        player.rotation=0;
    }

    ctx.save();
    ctx.translate(player.x+20,player.y+20);
    ctx.rotate(player.rotation);
    ctx.fillStyle="#00f5ff";
    ctx.fillRect(-20,-20,40,40);
    ctx.restore();

    spikes.forEach(s=>{
        let screenX=s.x-worldX;
        if(screenX>-50 && screenX<canvas.width){
            ctx.beginPath();
            ctx.moveTo(screenX,s.y);
            ctx.lineTo(screenX+s.size/2,s.y-s.size);
            ctx.lineTo(screenX+s.size,s.y);
            ctx.closePath();
            ctx.fillStyle="#ff3b3b";
            ctx.fill();

            // Accurate triangle collision
            if(pointInTriangle(
                player.x+20,
                player.y+20,
                {x:screenX,y:s.y},
                {x:screenX+s.size/2,y:s.y-s.size},
                {x:screenX+s.size,y:s.y}
            )){
                death();
            }
        }
    });

    let portalX=finishX-worldX;
    if(portalX<canvas.width){
        ctx.fillStyle="#00ff88";
        ctx.beginPath();
        ctx.arc(portalX,canvas.height-160,30,0,Math.PI*2);
        ctx.fill();

        if(player.x+player.w>portalX-20){
            win();
            return;
        }
    }

    requestAnimationFrame(gameLoop);
}

function pointInTriangle(px,py,a,b,c){
    const area=(x1,y1,x2,y2,x3,y3)=>Math.abs((x1*(y2-y3)+x2*(y3-y1)+x3*(y1-y2))/2);
    let A=area(a.x,a.y,b.x,b.y,c.x,c.y);
    let A1=area(px,py,b.x,b.y,c.x,c.y);
    let A2=area(a.x,a.y,px,py,c.x,c.y);
    let A3=area(a.x,a.y,b.x,b.y,px,py);
    return Math.abs(A-(A1+A2+A3))<1;
}

function jump(){
    jumpBuffer=8;
}

function death(){
    playing=false;
    setTimeout(startGame,700);
}

function win(){
    playing=false;
    let randomItem=items[Math.floor(Math.random()*items.length)];
    let result=document.getElementById("result");
    result.innerText="✨ "+randomItem+" ✨";
    result.style.opacity=1;
}

canvas.addEventListener("click",jump);
canvas.addEventListener("touchstart",e=>{
    e.preventDefault();
    jump();
},{passive:false});
</script>

</body>
</html>
