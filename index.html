<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Lock Breaker</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0f2027, #000);
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    overflow: hidden;
}

h1 { margin-top: 10px; }

textarea {
    width: 80%;
    max-width: 500px;
    height: 70px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    resize: none;
}

button {
    margin: 8px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    color: white;
}

#shards {
    margin-top: 5px;
    font-size: 1.2rem;
}

#result {
    font-size: 2rem;
    margin-top: 10px;
    opacity: 0;
    transition: opacity 0.8s ease;
}

canvas {
    display: block;
    margin: 0 auto;
    touch-action: none;
}
</style>
</head>

<body>

<h1>💎 Energy Lock Breaker</h1>

<textarea id="itemInput" placeholder="Enter items separated by commas..."></textarea><br>
<button onclick="saveList()">Save List</button>
<button onclick="startGame()">Start Game</button>

<div id="shards">Shards: 0 / 5</div>
<canvas id="gameCanvas"></canvas>
<div id="result"></div>

<script>
let items = [];
let shards = 0;
let nodes = [];
let targetColor;
let playing = false;

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.55;
}
resizeCanvas();
window.onresize = resizeCanvas;

window.onload = () => {
    const saved = localStorage.getItem("lockItems");
    if (saved) {
        items = JSON.parse(saved);
        document.getElementById("itemInput").value = items.join(", ");
    }
};

function saveList() {
    const input = document.getElementById("itemInput").value;
    items = input.split(",").map(i => i.trim()).filter(i => i);
    if (items.length === 0) return alert("Enter at least one item.");
    localStorage.setItem("lockItems", JSON.stringify(items));
    alert("List saved!");
}

function startGame() {
    if (items.length === 0) return alert("Save your list first.");
    shards = 0;
    document.getElementById("shards").innerText = "Shards: 0 / 5";
    document.getElementById("result").style.opacity = 0;
    nodes = [];
    playing = true;

    const colors = ["#ff3b3b", "#3bff57", "#3b9bff", "#ffcc00", "#ff00ff"];
    targetColor = colors[Math.floor(Math.random() * colors.length)];

    for (let i = 0; i < 7; i++) {
        nodes.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            radius: 25,
            color: colors[Math.floor(Math.random() * colors.length)]
        });
    }

    animate();
}

function animate() {
    if (!playing) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    nodes.forEach(n => {
        n.x += n.vx;
        n.y += n.vy;

        if (n.x < n.radius || n.x > canvas.width - n.radius) n.vx *= -1;
        if (n.y < n.radius || n.y > canvas.height - n.radius) n.vy *= -1;

        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
        ctx.fillStyle = n.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = n.color;
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    requestAnimationFrame(animate);
}

function checkHit(x, y) {
    if (!playing) return;

    nodes.forEach(n => {
        const dist = Math.hypot(n.x - x, n.y - y);
        if (dist < n.radius) {
            if (n.color === targetColor) {
                shards++;
                document.getElementById("shards").innerText = "Shards: " + shards + " / 5";
                n.vx *= 1.2;
                n.vy *= 1.2;
            } else {
                shards = Math.max(0, shards - 1);
                document.getElementById("shards").innerText = "Shards: " + shards + " / 5";
            }

            if (shards >= 5) unlock();
        }
    });
}

function unlock() {
    playing = false;
    const randomItem = items[Math.floor(Math.random() * items.length)];
    const result = document.getElementById("result");
    result.innerText = "✨ " + randomItem + " ✨";
    result.style.opacity = 1;
}

canvas.addEventListener("click", e => {
    const rect = canvas.getBoundingClientRect();
    checkHit(e.clientX - rect.left, e.clientY - rect.top);
});

canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    checkHit(touch.clientX - rect.left, touch.clientY - rect.top);
}, {passive:false});
</script>

</body>
</html>
