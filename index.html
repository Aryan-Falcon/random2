<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vault of Trials</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    overflow: hidden;
}

h1 {
    margin-top: 15px;
    font-size: 2.3rem;
}

#inputSection {
    margin: 15px;
}

textarea {
    width: 60%;
    height: 80px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    font-size: 1rem;
    resize: none;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg, #ff512f, #dd2476);
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin: 10px;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

#gameArea {
    position: relative;
    width: 100%;
    height: 55vh;
}

#targetZone {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120px;
    height: 120px;
    transform: translate(-50%, -50%);
    border: 4px solid white;
    border-radius: 50%;
    box-shadow: 0 0 20px white;
}

#movingCircle {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 350px;
    height: 350px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 4px solid #ffcc00;
    transition: width 2.5s linear, height 2.5s linear;
}

#stars {
    font-size: 1.5rem;
    margin-top: 10px;
}

#vault {
    font-size: 3rem;
    margin-top: 15px;
    opacity: 0;
    transition: opacity 1s ease;
}
</style>
</head>

<body>

<h1>🔐 Vault of Trials</h1>

<div id="inputSection">
    <textarea id="itemInput" placeholder="Enter items separated by commas..."></textarea><br>
    <button onclick="saveList()">Save List</button>
    <button onclick="startGame()">Start Trial</button>
</div>

<div id="stars">Stars: 0 ⭐</div>

<div id="gameArea">
    <div id="targetZone"></div>
    <div id="movingCircle"></div>
</div>

<div id="vault"></div>

<script>
let items = [];
let stars = 0;
let gameActive = false;

window.onload = function() {
    const saved = localStorage.getItem("vaultItems");
    if (saved) {
        items = JSON.parse(saved);
        document.getElementById("itemInput").value = items.join(", ");
    }
};

function saveList() {
    const input = document.getElementById("itemInput").value;
    items = input.split(",").map(i => i.trim()).filter(i => i.length > 0);
    if (items.length === 0) return alert("Enter at least one item.");
    localStorage.setItem("vaultItems", JSON.stringify(items));
    alert("List saved!");
}

function startGame() {
    if (items.length === 0) return alert("Save a list first.");
    if (gameActive) return;

    document.getElementById("vault").style.opacity = 0;
    gameActive = true;

    const circle = document.getElementById("movingCircle");
    circle.style.width = "350px";
    circle.style.height = "350px";

    setTimeout(() => {
        circle.style.width = "60px";
        circle.style.height = "60px";
    }, 50);

    circle.onclick = checkHit;
}

function checkHit() {
    if (!gameActive) return;

    const circle = document.getElementById("movingCircle");
    const size = circle.offsetWidth;

    if (size <= 140 && size >= 100) {
        stars++;
        document.getElementById("stars").innerText = "Stars: " + stars + " ⭐";
    }

    gameActive = false;

    if (stars >= 5) {
        unlockVault();
    }
}

function unlockVault() {
    const randomItem = items[Math.floor(Math.random() * items.length)];
    const vault = document.getElementById("vault");
    vault.innerText = "✨ " + randomItem + " ✨";
    vault.style.opacity = 1;
    stars = 0;
    document.getElementById("stars").innerText = "Stars: 0 ⭐";
}
</script>

</body>
</html>
