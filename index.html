<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Runner v2</title>
<style>
body{
    margin:0;
    background:#000;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
    overflow:hidden;
}
h1{margin:10px;}
textarea{
    width:80%;
    max-width:500px;
    height:70px;
    border-radius:10px;
    border:none;
    padding:10px;
    resize:none;
}
button{
    margin:6px;
    padding:10px 20px;
    border-radius:20px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(45deg,#00f5ff,#7b2ff7);
    color:white;
}
canvas{
    display:block;
    margin:0 auto;
    background:linear-gradient(#111,#000);
    touch-action:none;
}
#result{
    font-size:2rem;
    opacity:0;
    transition:opacity 1s ease;
}
</style>
</head>
<body>

<h1>🚀 Vault Runner v2</h1>

<textarea id="itemInput" placeholder="Enter items separated by commas..."></textarea><br>
<button onclick="saveList()">Save List</button>
<button onclick="startGame()">Start Run</button>

<canvas id="game"></canvas>
<div id="result"></div>

<script>
let items=[];
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight*0.55;
}
resize();
window.onresize=resize;

window.onload=()=>{
    const saved=localStorage.getItem("runnerItemsV2");
    if(saved){
        items=JSON.parse(saved);
        document.getElementById("itemInput").value=items.join(", ");
    }
};

function saveList(){
    const input=document.getElementById("itemInput").value;
    items=input.split(",").map(i=>i.trim()).filter(i=>i);
    if(items.length===0) return alert("Enter at least one item.");
    localStorage.setItem("runnerItemsV2",JSON.stringify(items));
    alert("List saved.");
}

let player,ground,speed,worldX,obstacles,finishX,playing;

function startGame(){
    if(items.length===0) return alert("Save your list first.");

    document.getElementById("result").style.opacity=0;

    ground=canvas.height-80;
    player={x:150,y:ground-40,w:40,h:40,vy:0,jumping:false};
    speed=6;
    worldX=0;
    playing=true;

    generateLevel();
    gameLoop();
}

function generateLevel(){
    obstacles=[];
    let x=600;
    const levelLength=6000;

    while(x<levelLength){
        let pattern=Math.random();

        if(pattern<0.5){
            // Single spike
            obstacles.push({x:x,width:40,height:40});
            x+=200; // guaranteed landing space
        }else{
            // Double spike max
            obstacles.push({x:x,width:40,height:40});
            obstacles.push({x:x+50,width:40,height:40});
            x+=260; // safe space after double
        }
    }

    finishX=levelLength+200;
}

function gameLoop(){
    if(!playing) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    worldX+=speed;

    // ground
    ctx.fillStyle="#222";
    ctx.fillRect(0,ground,canvas.width,80);

    // player physics
    player.vy+=0.8;
    player.y+=player.vy;

    if(player.y+player.h>ground){
        player.y=ground-player.h;
        player.vy=0;
        player.jumping=false;
    }

    // draw player
    ctx.fillStyle="#00f5ff";
    ctx.shadowBlur=15;
    ctx.shadowColor="#00f5ff";
    ctx.fillRect(player.x,player.y,player.w,player.h);
    ctx.shadowBlur=0;

    // draw obstacles
    ctx.fillStyle="#ff3b3b";
    obstacles.forEach(o=>{
        let screenX=o.x-worldX;
        if(screenX>-50 && screenX<canvas.width+50){
            ctx.beginPath();
            ctx.moveTo(screenX,ground);
            ctx.lineTo(screenX+o.width/2,ground-o.height);
            ctx.lineTo(screenX+o.width,ground);
            ctx.closePath();
            ctx.fill();

            // collision
            if(player.x<screenX+o.width &&
               player.x+player.w>screenX &&
               player.y<ground &&
               player.y+player.h>ground-o.height){
                restart();
            }
        }
    });

    // finish portal
    let portalX=finishX-worldX;
    if(portalX<canvas.width){
        ctx.fillStyle="#00ff88";
        ctx.beginPath();
        ctx.arc(portalX,ground-40,30,0,Math.PI*2);
        ctx.fill();

        if(player.x+player.w>portalX-20){
            win();
            return;
        }
    }

    requestAnimationFrame(gameLoop);
}

function jump(){
    if(!player.jumping && playing){
        player.vy=-15;
        player.jumping=true;
    }
}

function restart(){
    playing=false;
    setTimeout(startGame,600);
}

function win(){
    playing=false;
    let randomItem=items[Math.floor(Math.random()*items.length)];
    let result=document.getElementById("result");
    result.innerText="✨ "+randomItem+" ✨";
    result.style.opacity=1;
}

canvas.addEventListener("click",jump);
canvas.addEventListener("touchstart",e=>{
    e.preventDefault();
    jump();
},{passive:false});
</script>

</body>
</html>
