<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO-FATE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Press+Start+2P&display=swap');
:root{--bg:#0b0b14;--panel:#10101e;--border:#1e1e3a;--neon:#00f0ff;--neon2:#ff3cac;--yellow:#ffe600;--purple:#8b5cf6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:999;}
#setup{display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;max-width:480px;padding:20px 16px 40px;animation:fadeUp .4s ease;}
#setup::-webkit-scrollbar{width:4px;}
#setup::-webkit-scrollbar-track{background:transparent;}
#setup::-webkit-scrollbar-thumb{background:rgba(0,240,255,0.2);border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.logo{font-family:'Press Start 2P',monospace;font-size:24px;letter-spacing:3px;text-align:center;line-height:1.6;}
.logo .geo{color:var(--neon);text-shadow:0 0 20px var(--neon),0 0 40px rgba(0,240,255,0.3);}
.logo .fate{color:var(--neon2);text-shadow:0 0 20px var(--neon2),0 0 40px rgba(255,60,172,0.3);}
.sub{font-size:13px;color:#444;letter-spacing:3px;text-transform:uppercase;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;width:100%;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neon),transparent);opacity:.4;}
.clabel{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--neon);letter-spacing:2px;margin-bottom:12px;}
.row{display:flex;gap:8px;align-items:center;}
input[type=text],input[type=number]{background:#000;border:1px solid var(--border);border-radius:4px;color:var(--neon);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:15px;padding:9px 12px;outline:none;flex:1;transition:border-color .2s,box-shadow .2s;caret-color:var(--neon);}
input:focus{border-color:var(--neon);box-shadow:0 0 10px rgba(0,240,255,0.15);}
input[type=number]{width:72px;flex:none;}
.btn-add{background:transparent;border:1px solid var(--neon);color:var(--neon);border-radius:4px;font-family:'Press Start 2P',monospace;font-size:8px;padding:9px 14px;cursor:pointer;transition:all .15s;white-space:nowrap;box-shadow:0 0 8px rgba(0,240,255,0.2);}
.btn-add:hover{background:rgba(0,240,255,0.08);box-shadow:0 0 16px rgba(0,240,255,0.4);}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;min-height:28px;}
.tag{background:#0a0a1a;border:1px solid #2a2a4a;border-radius:3px;padding:4px 10px;font-size:13px;font-weight:600;color:#ccc;display:flex;align-items:center;gap:6px;animation:popIn .18s ease;}
@keyframes popIn{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.tag button{background:none;border:none;color:#e05c5c;cursor:pointer;font-size:15px;line-height:1;padding:0;}
.tag button:hover{color:#ff8080;}
.hint{font-size:13px;color:#2a2a4a;align-self:center;}
.row-score label{font-size:13px;color:#555;white-space:nowrap;font-weight:600;}
.btn-start{width:100%;background:linear-gradient(135deg,var(--neon2),var(--purple));color:#fff;border:none;border-radius:4px;font-family:'Press Start 2P',monospace;font-size:10px;padding:15px;cursor:pointer;letter-spacing:2px;transition:all .15s;box-shadow:0 0 20px rgba(255,60,172,0.35);margin-top:4px;}
.btn-start:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 0 30px rgba(255,60,172,0.6);}
.btn-start:disabled{background:#1a1a2e;color:#333;box-shadow:none;cursor:not-allowed;}
#game{display:none;flex-direction:column;align-items:center;position:relative;}
#hud{width:100%;display:flex;justify-content:space-between;align-items:center;padding:5px 4px;font-family:'Press Start 2P',monospace;font-size:9px;}
.hud-dist{color:var(--neon);text-shadow:0 0 8px var(--neon);}
.hud-target{color:var(--neon2);font-size:7px;text-align:right;}
.hud-attempts{color:#444;font-size:7px;}
#gc{display:block;border:1px solid rgba(0,240,255,0.2);box-shadow:0 0 30px rgba(0,240,255,0.08);}
#overlay{display:none;position:absolute;top:34px;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;text-align:center;}
.ov-title{font-family:'Press Start 2P',monospace;font-size:18px;}
.ov-dead{color:var(--neon2);text-shadow:0 0 20px var(--neon2);animation:shake .35s ease;}
.ov-win{color:var(--yellow);text-shadow:0 0 20px var(--yellow);}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.ov-sub{font-size:13px;color:#555;font-weight:700;}
.reveal-card{background:#000;border:2px solid var(--yellow);border-radius:6px;padding:22px 30px;box-shadow:0 0 40px rgba(255,230,0,0.25);animation:revealPop .6s cubic-bezier(.175,.885,.32,1.275);max-width:270px;width:100%;}
@keyframes revealPop{0%{transform:scale(.2) rotate(-12deg);opacity:0}70%{transform:scale(1.05) rotate(1deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.reveal-eyebrow{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--neon);letter-spacing:3px;margin-bottom:10px;}
.reveal-text{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--yellow);text-shadow:0 0 10px rgba(255,230,0,0.5);line-height:1.5;word-break:break-word;}
.btn-retry,.btn-back{background:#000;border:1px solid #2a2a4a;color:#aaa;border-radius:4px;font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 18px;cursor:pointer;transition:all .15s;}
.btn-retry:hover{border-color:var(--neon2);color:var(--neon2);}
.btn-back{font-size:7px;}
.btn-back:hover{border-color:var(--neon);color:var(--neon);}
.skin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px;}
.skin-opt{background:#000;border:2px solid #1e1e3a;border-radius:6px;padding:8px 4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:border-color .15s,box-shadow .15s;}
.skin-opt:hover{border-color:rgba(0,240,255,0.5);}
.skin-opt.active{border-color:var(--neon);box-shadow:0 0 12px rgba(0,240,255,0.3);}
.skin-opt canvas{display:block;}
.skin-name{font-family:'Press Start 2P',monospace;font-size:5px;color:#666;text-align:center;line-height:1.5;}
.skin-opt.active .skin-name{color:var(--neon);}
</style>
</head>
<body>
<div id="setup">
  <div class="logo"><div class="geo">GEO</div><div class="fate">FATE</div></div>
  <div class="sub">jump · survive · reveal</div>
  <div class="card">
    <div class="clabel">◈ TARGET DISTANCE</div>
    <div class="row row-score">
      <label>Meters to travel:</label>
      <input type="number" id="target-dist" value="300" min="50" max="9999">
    </div>
  </div>
  <div class="card">
    <div class="clabel">◉ CHOICE POOL</div>
    <div class="row">
      <input type="text" id="choice-input" placeholder="Add a choice..." maxlength="40">
      <button class="btn-add" onclick="addChoice()">+ ADD</button>
    </div>
    <div class="tags" id="tags"><span class="hint">No choices yet</span></div>
  </div>
  <div class="card">
    <div class="clabel">◆ CUBE SKIN</div>
    <div class="skin-grid" id="skin-grid"></div>
  </div>
  <button class="btn-start" id="start-btn" onclick="startGame()" disabled>▶ LAUNCH</button>
</div>

<div id="game">
  <div id="hud">
    <div class="hud-dist">⬡ <span id="dist-val">0</span>m</div>
    <div class="hud-attempts">ATTEMPT <span id="attempt-val">1</span></div>
    <div class="hud-target">TARGET<br><span id="target-val">0</span>m</div>
  </div>
  <canvas id="gc"></canvas>
  <div id="overlay"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  SKINS
// ══════════════════════════════════════════════════════════
const SKINS = [
  {id:'neon',name:'NEON\nCLASSIC',draw(ctx,h,angle){ctx.shadowColor='#00f0ff';ctx.shadowBlur=18;ctx.fillStyle='#060f1c';ctx.fillRect(-h,-h,h*2,h*2);ctx.strokeStyle='#00f0ff';ctx.lineWidth=2.5;ctx.strokeRect(-h,-h,h*2,h*2);ctx.shadowBlur=0;ctx.strokeStyle='rgba(0,240,255,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-h+5,-h+5);ctx.lineTo(h-5,h-5);ctx.moveTo(h-5,-h+5);ctx.lineTo(-h+5,h-5);ctx.stroke();ctx.fillStyle='rgba(0,240,255,0.65)';[[-h+4,-h+4],[h-4,-h+4],[h-4,h-4],[-h+4,h-4]].forEach(([cx,cy])=>{ctx.beginPath();ctx.arc(cx,cy,1.5,0,Math.PI*2);ctx.fill();});}},
  {id:'fire',name:'FIRE\nCUBE',draw(ctx,h){ctx.shadowColor='#ff6a00';ctx.shadowBlur=16;ctx.fillStyle='#1a0500';ctx.fillRect(-h,-h,h*2,h*2);ctx.strokeStyle='#ff6a00';ctx.lineWidth=2.5;ctx.strokeRect(-h,-h,h*2,h*2);ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,160,0,0.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-h+6,h-4);ctx.bezierCurveTo(-h+6,-2,0,-h+6,0,-h+4);ctx.stroke();ctx.beginPath();ctx.moveTo(h-6,h-4);ctx.bezierCurveTo(h-6,-2,0,-h+8,0,-h+4);ctx.stroke();ctx.fillStyle='rgba(255,120,0,0.6)';[[-h+4,-h+4],[h-4,-h+4],[h-4,h-4],[-h+4,h-4]].forEach(([cx,cy])=>{ctx.beginPath();ctx.arc(cx,cy,1.5,0,Math.PI*2);ctx.fill();});}},
  {id:'ghost',name:'GHOST\nMODE',draw(ctx,h){ctx.shadowColor='#cc88ff';ctx.shadowBlur=14;ctx.fillStyle='rgba(20,5,40,0.9)';ctx.fillRect(-h,-h,h*2,h*2);ctx.strokeStyle='#cc88ff';ctx.lineWidth=2;ctx.strokeRect(-h,-h,h*2,h*2);ctx.shadowBlur=0;ctx.fillStyle='#cc88ff';ctx.beginPath();ctx.arc(-h/3,-h/4,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(h/3,-h/4,3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(200,136,255,0.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,h/4,5,0.1*Math.PI,0.9*Math.PI);ctx.stroke();}},
  {id:'gold',name:'GOLD\nRUSH',draw(ctx,h){ctx.shadowColor='#ffd700';ctx.shadowBlur=16;const grad=ctx.createLinearGradient(-h,-h,h,h);grad.addColorStop(0,'#7a5800');grad.addColorStop(0.5,'#ffd700');grad.addColorStop(1,'#a07000');ctx.fillStyle=grad;ctx.fillRect(-h,-h,h*2,h*2);ctx.strokeStyle='#ffe566';ctx.lineWidth=2.5;ctx.strokeRect(-h,-h,h*2,h*2);ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,200,0.7)';ctx.beginPath();for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2,b=a+Math.PI/5;ctx.lineTo(Math.cos(a)*6,Math.sin(a)*6);ctx.lineTo(Math.cos(b)*3,Math.sin(b)*3);}ctx.closePath();ctx.fill();}},
  {id:'glitch',name:'GLITCH',draw(ctx,h,angle){ctx.fillStyle='#00ff88';ctx.globalAlpha=0.15;ctx.fillRect(-h+2,-h+2,h*2,h*2);ctx.globalAlpha=1;ctx.fillStyle='#0a1a10';ctx.fillRect(-h,-h,h*2,h*2);ctx.strokeStyle='#00ff88';ctx.lineWidth=2.5;ctx.strokeRect(-h,-h,h*2,h*2);ctx.fillStyle='rgba(0,255,136,0.25)';ctx.fillRect(-h,-h/3,h*2,4);ctx.fillRect(-h,h/4,h*2,3);ctx.strokeStyle='rgba(255,0,200,0.4)';ctx.lineWidth=1;ctx.strokeRect(-h+1,-h+1,h*2-2,h*2-2);ctx.fillStyle='rgba(0,255,136,0.6)';[[-h+4,-h+4],[h-4,-h+4],[h-4,h-4],[-h+4,h-4]].forEach(([cx,cy])=>{ctx.beginPath();ctx.arc(cx,cy,1.5,0,Math.PI*2);ctx.fill();});}},
  {id:'dog',name:'GOOD\nBOY 🐶',draw(ctx,h){ctx.shadowColor='#c8860a';ctx.shadowBlur=10;ctx.fillStyle='#c8860a';ctx.fillRect(-h,-h,h*2,h*2);ctx.strokeStyle='#7a4e00';ctx.lineWidth=2;ctx.strokeRect(-h,-h,h*2,h*2);ctx.shadowBlur=0;ctx.fillStyle='#a06800';ctx.beginPath();ctx.ellipse(-h+2,-h+1,5,7,-.4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(h-2,-h+1,5,7,.4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e8a830';ctx.beginPath();ctx.ellipse(0,h/5,7,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.beginPath();ctx.ellipse(0,h/5-2,3,2,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-h/3,-h/6,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(h/3,-h/6,2.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-h/3+1,-h/6-1,1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(h/3+1,-h/6-1,1,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff6688';ctx.beginPath();ctx.ellipse(0,h/4+3,3,4,0,0,Math.PI);ctx.fill();}},
  {id:'cat',name:'CAT\n😸',draw(ctx,h){ctx.shadowColor='#aaaacc';ctx.shadowBlur=8;ctx.fillStyle='#888898';ctx.fillRect(-h,-h,h*2,h*2);ctx.strokeStyle='#555566';ctx.lineWidth=2;ctx.strokeRect(-h,-h,h*2,h*2);ctx.shadowBlur=0;ctx.fillStyle='#777788';ctx.beginPath();ctx.moveTo(-h,-h);ctx.lineTo(-h+5,-h-7);ctx.lineTo(-h+10,-h);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(h-10,-h);ctx.lineTo(h-5,-h-7);ctx.lineTo(h,-h);ctx.closePath();ctx.fill();ctx.fillStyle='#ffaabb';ctx.beginPath();ctx.moveTo(-h+1,-h);ctx.lineTo(-h+5,-h-5);ctx.lineTo(-h+9,-h);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(h-9,-h);ctx.lineTo(h-5,-h-5);ctx.lineTo(h-1,-h);ctx.closePath();ctx.fill();ctx.fillStyle='#88ff44';ctx.beginPath();ctx.ellipse(-h/3,-h/5,4,3,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(h/3,-h/5,4,3,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(-h/3,-h/5,1.2,3,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(h/3,-h/5,1.2,3,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff88aa';ctx.beginPath();ctx.moveTo(-2,h/5-1);ctx.lineTo(0,h/5+2);ctx.lineTo(2,h/5-1);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(-4,h/5);ctx.lineTo(-h+2,h/5-2);ctx.stroke();ctx.beginPath();ctx.moveTo(-4,h/5+2);ctx.lineTo(-h+2,h/5+3);ctx.stroke();ctx.beginPath();ctx.moveTo(4,h/5);ctx.lineTo(h-2,h/5-2);ctx.stroke();ctx.beginPath();ctx.moveTo(4,h/5+2);ctx.lineTo(h-2,h/5+3);ctx.stroke();}},
  {id:'frog',name:'FROG\n🐸',draw(ctx,h){ctx.shadowColor='#44dd44';ctx.shadowBlur=10;ctx.fillStyle='#228822';ctx.fillRect(-h,-h,h*2,h*2);ctx.strokeStyle='#115511';ctx.lineWidth=2;ctx.strokeRect(-h,-h,h*2,h*2);ctx.shadowBlur=0;ctx.fillStyle='#33aa33';ctx.beginPath();ctx.arc(-h/2,-h+2,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(h/2,-h+2,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-h/2,-h+2,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(h/2,-h+2,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-h/2,-h+2,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(h/2,-h+2,1.5,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#55ff55';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,h/3,7,0.15*Math.PI,0.85*Math.PI);ctx.stroke();ctx.fillStyle='rgba(150,255,150,0.2)';ctx.beginPath();ctx.ellipse(0,h/5,6,7,0,0,Math.PI*2);ctx.fill();}},
  {id:'panda',name:'PANDA\n🐼',draw(ctx,h){ctx.shadowColor='#cccccc';ctx.shadowBlur=8;ctx.fillStyle='#f0f0f0';ctx.fillRect(-h,-h,h*2,h*2);ctx.strokeStyle='#222';ctx.lineWidth=2;ctx.strokeRect(-h,-h,h*2,h*2);ctx.shadowBlur=0;ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-h+3,-h+3,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(h-3,-h+3,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.beginPath();ctx.ellipse(-h/3,-h/5,5,4,-.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(h/3,-h/5,5,4,.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-h/3,-h/5,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(h/3,-h/5,2.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-h/3,-h/5,1.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(h/3,-h/5,1.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#333';ctx.beginPath();ctx.ellipse(0,h/6,3,2,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,h/4,3,0.1*Math.PI,0.9*Math.PI);ctx.stroke();}},

let selectedSkin = 0;

function initSkinPicker(){
  const grid=document.getElementById('skin-grid');
  grid.innerHTML='';
  SKINS.forEach((skin,i)=>{
    const opt=document.createElement('div');
    opt.className='skin-opt'+(i===0?' active':'');
    opt.onclick=()=>selectSkin(i);
    const c=document.createElement('canvas');c.width=52;c.height=52;
    const pc=c.getContext('2d');pc.fillStyle='#000';pc.fillRect(0,0,52,52);
    pc.save();pc.translate(26,26);skin.draw(pc,13,0);pc.restore();
    const label=document.createElement('div');label.className='skin-name';label.textContent=skin.name;
    opt.appendChild(c);opt.appendChild(label);grid.appendChild(opt);
  });
}
function selectSkin(i){
  selectedSkin=i;
  document.querySelectorAll('.skin-opt').forEach((el,j)=>el.classList.toggle('active',j===i));
}
window.addEventListener('DOMContentLoaded',initSkinPicker);

const choices=[];
function addChoice(){const inp=document.getElementById('choice-input');const v=inp.value.trim();if(!v)return;choices.push(v);inp.value='';inp.focus();renderTags();updateStart();}
function removeChoice(i){choices.splice(i,1);renderTags();updateStart();}
function renderTags(){const el=document.getElementById('tags');el.innerHTML='';if(!choices.length){el.innerHTML='<span class="hint">No choices yet</span>';return;}choices.forEach((c,i)=>{const d=document.createElement('div');d.className='tag';d.innerHTML=`<span>${c}</span><button onclick="removeChoice(${i})">×</button>`;el.appendChild(d);});}
function updateStart(){document.getElementById('start-btn').disabled=choices.length<2;}
document.getElementById('choice-input').addEventListener('keydown',e=>{if(e.key==='Enter')addChoice();});

// ══════════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════════
const C=document.getElementById('gc');
const ctx=C.getContext('2d');
const LW=520,LH=280;
let scale=1;
const GRAVITY=0.60,JUMP_VEL=-13.8,SCROLL=0.20,GY=LH-52,CS=28,CUBE_X=100;
const E1=40,E2=76,E3=112;

// ══════════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════════
let targetDist,pool,attempts;
let gameState,animId,lastTime;
let cube,platforms,spikes,gaps,particles,bgStars;
let dist,scrollX,nextSegX,jumpBuffered;

// ══════════════════════════════════════════════════════════
//  START / INIT
// ══════════════════════════════════════════════════════════
function startGame(){
  targetDist=parseInt(document.getElementById('target-dist').value)||300;
  pool=[...choices];attempts=1;
  const maxW=Math.min(window.innerWidth-8,600);
  scale=maxW/LW;C.width=Math.round(LW*scale);C.height=Math.round(LH*scale);
  document.getElementById('target-val').textContent=targetDist;
  document.getElementById('attempt-val').textContent=1;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='flex';
  bgStars=Array.from({length:80},()=>({x:Math.random()*LW,y:Math.random()*(GY-20),sz:Math.random()*1.8+0.3,spd:Math.random()*0.022+0.004}));
  initRound();
}
function initRound(){
  cube={x:CUBE_X,y:GY-CS,vy:0,angle:0,onGround:true};
  platforms=[];spikes=[];gaps=[];particles=[];
  dist=0;scrollX=0;jumpBuffered=false;nextSegX=LW+80;
  gameState='waiting';
  document.getElementById('overlay').style.display='none';
  document.getElementById('dist-val').textContent='0';
  if(animId)cancelAnimationFrame(animId);
  lastTime=0;
  animId=requestAnimationFrame(ts=>{lastTime=ts;loop(ts);});
}

// ══════════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════════
function doJump(){
  if(gameState==='dead'||gameState==='won')return;
  if(gameState==='waiting')gameState='playing';
  if(cube.onGround){cube.vy=JUMP_VEL;cube.onGround=false;spawnJumpFX();}
  else{jumpBuffered=true;}
}
var _spaceHeld=false;
document.addEventListener('keydown',e=>{if((e.code==='Space'||e.key===' ')&&!_spaceHeld){e.preventDefault();_spaceHeld=true;doJump();}});
document.addEventListener('keyup',e=>{if(e.code==='Space'||e.key===' ')_spaceHeld=false;});
C.addEventListener('click',doJump);
C.addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});

// ══════════════════════════════════════════════════════════
//  LOOP
// ══════════════════════════════════════════════════════════
function loop(ts){const dt=Math.min(ts-lastTime,33);lastTime=ts;if(gameState==='playing')update(dt);draw();animId=requestAnimationFrame(loop);}

// ══════════════════════════════════════════════════════════
//  UPDATE
// ══════════════════════════════════════════════════════════
function update(dt){
  scrollX+=SCROLL*dt;dist=Math.floor(scrollX/3.2);
  document.getElementById('dist-val').textContent=dist;
  if(dist>=targetDist){triggerWin();return;}
  const f=dt/16.667;
  cube.vy+=GRAVITY*f;cube.y+=cube.vy*f;
  bgStars.forEach(s=>{s.x-=s.spd*dt;if(s.x<0)s.x=LW;});
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.0018*dt;p.life-=dt;p.a=p.life/p.ml;});
  particles=particles.filter(p=>p.life>0);
  while(nextSegX-scrollX<LW+300){genSegment(nextSegX);nextSegX+=220+Math.random()*200;}
  platforms=platforms.filter(p=>p.wx-scrollX>-200);
  spikes=spikes.filter(s=>s.wx-scrollX>-60);
  gaps=gaps.filter(g=>g.wx-scrollX>-200);
  const surfaces=[{wx:scrollX-200,y:GY,w:LW+400},...platforms];
  let landed=false;
  const cBot=cube.y+CS,cL=cube.x+3,cR=cube.x+CS-3;
  const overGap=gaps.some(g=>{const gx=g.wx-scrollX;return cR>gx&&cL<gx+g.w;});
  for(const s of surfaces){
    if(s.y===GY&&overGap)continue;
    const sx=s.wx-scrollX,sR=sx+s.w;
    if(cR>sx&&cL<sR){if(cube.vy>=0&&cBot>=s.y&&cBot<=s.y+Math.abs(cube.vy*f)+6){cube.y=s.y-CS;cube.vy=0;landed=true;break;}}
  }
  if(landed){if(!cube.onGround){cube.onGround=true;if(jumpBuffered){jumpBuffered=false;cube.vy=JUMP_VEL;cube.onGround=false;spawnJumpFX();}}}
  else{cube.onGround=false;}
  if(cube.y>LH+60){triggerDeath();return;}
  if(!cube.onGround)cube.angle+=0.0045*dt;
  else cube.angle=Math.round(cube.angle/(Math.PI/2))*(Math.PI/2);
  const hx=cube.x+5,hy=cube.y+5,hw=CS-10,hh=CS-10;
  for(const s of spikes){const sx=s.wx-scrollX;if(hx+hw>sx+5&&hx<sx+s.w-5&&hy+hh>s.y+7&&hy<s.y+s.h){triggerDeath();return;}}
}

// ══════════════════════════════════════════════════════════
//  LEVEL GENERATION
// ══════════════════════════════════════════════════════════
function genSegment(wx){
  const r=Math.random();
  // Probability table — harder patterns get meaningful weight
  if     (r<0.08) seg_groundSpike(wx);        // single spike  (easy warm-up)
  else if(r<0.18) seg_singlePlatform(wx);     // elevated platform (breather)
  else if(r<0.29) seg_doubleSpike(wx);        // two spikes — need clean jump
  else if(r<0.40) seg_tripleSpike(wx);        // ★ three spikes — must jump early
  else if(r<0.50) seg_platformWithSpike(wx);  // spike + platform escape
  else if(r<0.58) seg_stairUp(wx);            // ascending stairs
  else if(r<0.65) seg_stairDown(wx);          // descending stairs
  else if(r<0.73) seg_gap(wx);                // gap with mid-platform
  else if(r<0.80) seg_highPlatform(wx);       // spike + tall platform
  else if(r<0.87) seg_spikeGauntlet(wx);      // ★ spike–gap–spike combo
  else if(r<0.93) seg_tripleWithEscape(wx);   // ★ 3 spikes + side platform
  else             seg_zigzagPlatforms(wx);    // ★ alternating elevated platforms
}

// ── Basic segments ──
function seg_groundSpike(wx){addSpike(wx,0,GY-28,28,28);}

function seg_doubleSpike(wx){
  addSpike(wx,0,GY-28,28,28);
  addSpike(wx,34,GY-28,28,28);
}

// ★ Three consecutive ground spikes. Width = 3×34 = 102px.
// At scroll 0.20px/ms the cube travels ~102px in ~510ms; jump clears it cleanly
// if the player jumps just before the first spike. A landing platform is NOT
// placed here — the ground after the trio is the safe zone.
function seg_tripleSpike(wx){
  addSpike(wx,  0, GY-28, 28, 28);
  addSpike(wx, 34, GY-28, 28, 28);
  addSpike(wx, 68, GY-28, 28, 28);
}

// ── Platform segments ──
function seg_singlePlatform(wx){
  const elev=Math.random()<0.5?E1:E2;
  const pw=80+Math.floor(Math.random()*60);
  addPlatform(wx+20,GY-elev,pw);
}

// Spike on ground, platform at E1 for escape, optional spike on that platform
function seg_platformWithSpike(wx){
  addSpike(wx,0,GY-28,28,28);
  addPlatform(wx+44,GY-E1,80);
  if(Math.random()<0.45) addSpike(wx+44,28,GY-E1-28,28,28);
}

function seg_stairUp(wx){
  addPlatform(wx,    GY-E1, 46);
  addPlatform(wx+54, GY-E2, 46);
  addPlatform(wx+108,GY-E3, 46);
}

function seg_stairDown(wx){
  addPlatform(wx,    GY-E3, 46);
  addPlatform(wx+54, GY-E2, 46);
  addPlatform(wx+108,GY-E1, 46);
}

function seg_gap(wx){
  const gapW=80+Math.random()*36;
  gaps.push({wx,w:gapW});
  addPlatform(wx+gapW/2-22,GY-E2,44);
}

// Spike at base, then a tall platform the player must ride
function seg_highPlatform(wx){
  addSpike(wx,0,GY-28,28,28);
  addPlatform(wx+44,GY-E3,100);
}

// ★ Spike — gap — spike: two ground spikes with a narrow gap between them.
// The gap is passable on ground but spiked on both ends; the platform bridge
// at E2 gives a clear aerial path over the whole thing.
function seg_spikeGauntlet(wx){
  addSpike(wx,  0, GY-28, 28, 28);           // spike 1
  addSpike(wx, 34, GY-28, 28, 28);           // spike 2 — gap at 62..90
  addSpike(wx, 96, GY-28, 28, 28);           // spike 3 after gap
  // Elevated platform lets player hop over the entire cluster
  addPlatform(wx+20, GY-E2, 90);
}

// ★ Triple spike with a side platform giving a clear jump-on escape route.
// The platform starts before spike 1 so the player can jump onto it early,
// ride across, and land safely after spike 3.
function seg_tripleWithEscape(wx){
  addSpike(wx,  0, GY-28, 28, 28);
  addSpike(wx, 34, GY-28, 28, 28);
  addSpike(wx, 68, GY-28, 28, 28);
  // Platform at E1 overlaps the whole spike band — reachable with an early jump
  addPlatform(wx-10, GY-E1, 120);
}

// ★ Zigzag alternating platforms at E1 and E2 — requires timing two jumps
// with no ground fallback (spikes below each step).
function seg_zigzagPlatforms(wx){
  addSpike(wx,    0, GY-28, 28, 28);         // punish staying on ground
  addPlatform(wx+30,  GY-E1, 50);
  addSpike(wx+82, 0, GY-28, 28, 28);
  addPlatform(wx+116, GY-E2, 50);
  addSpike(wx+168,0, GY-28, 28, 28);
  addPlatform(wx+202, GY-E1, 50);
}

function addPlatform(wx,y,w){platforms.push({wx,y,w});}
function addSpike(wx,ox,y,w,h){spikes.push({wx:wx+ox,y,w,h});}

// ══════════════════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════════════════
function spawnJumpFX(){for(let i=0;i<10;i++){particles.push({x:cube.x+CS/2,y:cube.y+CS,vx:(Math.random()-.5)*0.13,vy:Math.random()*-0.11-0.02,life:280,ml:280,a:1,sz:Math.random()*3+1,col:`hsl(${185+Math.random()*30},100%,70%)`});}}
function spawnDeathFX(){for(let i=0;i<28;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*0.28+0.06;particles.push({x:cube.x+CS/2,y:cube.y+CS/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.1,life:600,ml:600,a:1,sz:Math.random()*5+2,col:`hsl(${Math.random()*60+180},100%,70%)`});}}

// ══════════════════════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════════════════════
function draw(){
  ctx.save();ctx.scale(scale,scale);
  const bg=ctx.createLinearGradient(0,0,0,LH);bg.addColorStop(0,'#03030c');bg.addColorStop(1,'#080818');ctx.fillStyle=bg;ctx.fillRect(0,0,LW,LH);
  bgStars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${0.1+s.sz*0.14})`;ctx.fillRect(s.x,s.y,s.sz,s.sz);});
  platforms.forEach(p=>{const px=p.wx-scrollX;if(px>LW+60||px<-p.w-10)return;drawPlatform(px,p.y,p.w);});
  drawGround();
  spikes.forEach(s=>{const sx=s.wx-scrollX;if(sx>LW+40||sx<-40)return;drawSpike(sx,s.y,s.w,s.h);});
  particles.forEach(p=>{ctx.globalAlpha=p.a;ctx.fillStyle=p.col;ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);});ctx.globalAlpha=1;
  if(gameState!=='dead')drawCube(cube.x,cube.y,cube.angle);
  const prog=Math.min(dist/targetDist,1);ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,LW,4);
  if(prog>0){const pg=ctx.createLinearGradient(0,0,LW*prog,0);pg.addColorStop(0,'#00f0ff');pg.addColorStop(1,'#ff3cac');ctx.fillStyle=pg;ctx.fillRect(0,0,LW*prog,4);}
  if(gameState==='waiting'){ctx.fillStyle='rgba(0,0,0,0.65)';rrect(LW/2-110,LH/2-16,220,32,6);ctx.fill();ctx.fillStyle='#00f0ff';ctx.font='7px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('TAP / SPACE TO START',LW/2,LH/2+5);}
  ctx.restore();
}
function drawGround(){
  const gapRanges=gaps.map(g=>({x:g.wx-scrollX,w:g.w}));
  ctx.strokeStyle='rgba(0,240,255,0.3)';ctx.lineWidth=1.5;ctx.beginPath();
  let cur=0;const sorted=[...gapRanges].sort((a,b)=>a.x-b.x);
  for(const g of sorted){const gStart=Math.max(0,g.x),gEnd=Math.min(LW,g.x+g.w);if(cur<gStart){ctx.moveTo(cur,GY);ctx.lineTo(gStart,GY);}cur=Math.max(cur,gEnd);}
  if(cur<LW){ctx.moveTo(cur,GY);ctx.lineTo(LW,GY);}ctx.stroke();
  const grd=ctx.createLinearGradient(0,GY,0,LH);grd.addColorStop(0,'#0d0d26');grd.addColorStop(1,'#050512');ctx.fillStyle=grd;
  ctx.beginPath();ctx.rect(0,GY,LW,LH-GY);gapRanges.forEach(g=>{ctx.rect(g.x,GY-2,g.w,LH);});ctx.fill('evenodd');
  ctx.strokeStyle='rgba(0,240,255,0.07)';ctx.lineWidth=1;const gs=40,go=scrollX%gs;
  for(let x=-go;x<LW;x+=gs){const inGap=gapRanges.some(g=>x>=g.x&&x<g.x+g.w);if(!inGap){ctx.beginPath();ctx.moveTo(x,GY);ctx.lineTo(x,LH);ctx.stroke();}}
}
function drawPlatform(x,y,w){
  const h=14;ctx.fillStyle='#0c1e3c';ctx.fillRect(x,y,w,h);ctx.fillStyle='rgba(0,240,255,0.7)';ctx.fillRect(x,y,w,2);ctx.fillStyle='rgba(0,240,255,0.12)';ctx.fillRect(x,y,2,h);ctx.strokeStyle='rgba(0,240,255,0.07)';ctx.lineWidth=1;
  for(let tx=x+32;tx<x+w;tx+=32){ctx.beginPath();ctx.moveTo(tx,y);ctx.lineTo(tx,y+h);ctx.stroke();}ctx.strokeStyle='rgba(0,240,255,0.25)';ctx.lineWidth=1;ctx.strokeRect(x+.5,y+.5,w-1,h-1);ctx.fillStyle='rgba(0,240,255,0.05)';ctx.fillRect(x+2,y+h,w-4,5);
}
function drawSpike(x,y,w,h){ctx.fillStyle='#bf1515';ctx.shadowColor='#ff2020';ctx.shadowBlur=8;ctx.beginPath();ctx.moveTo(x,y+h);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w,y+h);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,60,60,0.55)';ctx.lineWidth=1;ctx.stroke();ctx.shadowBlur=0;}
function drawCube(x,y,angle){ctx.save();ctx.translate(x+CS/2,y+CS/2);ctx.rotate(angle);const h=CS/2;SKINS[selectedSkin].draw(ctx,h,angle);ctx.restore();}
function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ══════════════════════════════════════════════════════════
//  TRIGGERS
// ══════════════════════════════════════════════════════════
function triggerDeath(){if(gameState==='dead'||gameState==='won')return;gameState='dead';spawnDeathFX();attempts++;document.getElementById('attempt-val').textContent=attempts;setTimeout(()=>showOverlay('dead'),700);}
function triggerWin(){if(gameState==='won')return;gameState='won';const chosen=pool[Math.floor(Math.random()*pool.length)];setTimeout(()=>showOverlay('won',chosen),400);}
function showOverlay(type,chosen){
  const ov=document.getElementById('overlay');ov.style.display='flex';
  if(type==='dead'){
    ov.innerHTML=`<div class="ov-title ov-dead">CRASHED</div><div class="ov-sub">${dist}m / ${targetDist}m &nbsp;·&nbsp; Attempt ${attempts}</div><button class="btn-retry" onclick="initRound()">▶ RETRY</button><button class="btn-back" onclick="backToSetup()">← edit choices</button>`;
  } else {
    ov.innerHTML=`<div class="ov-title ov-win">DESTINY UNLOCKED</div><div class="ov-sub">${dist}m traveled &nbsp;·&nbsp; ${attempts} attempt${attempts>1?'s':''}</div><div class="reveal-card"><div class="reveal-eyebrow">✦ fate has spoken ✦</div><div class="reveal-text">${chosen}</div></div><button class="btn-retry" onclick="initRound()">▶ PLAY AGAIN</button><button class="btn-back" onclick="backToSetup()">← edit choices</button>`;
  }
}
function backToSetup(){cancelAnimationFrame(animId);document.getElementById('game').style.display='none';document.getElementById('setup').style.display='flex';}

/* GEO-FATE AUDIO ENGINE — Web Audio API, zero external files */
let _ac=null,_mGain=null,_musicGain=null,_sfxGain=null,_musicNodes=[];
let _musicOn=true,_sfxOn=true,_musicVol=0.22,_sfxVol=0.55;
let _currentTrack='chiptune',_musicRunning=false,_musicLoopTimer=null;
function ac(){
  if(!_ac){
    _ac=new(window.AudioContext||window.webkitAudioContext)();
    _mGain=_ac.createGain();_mGain.gain.value=1;_mGain.connect(_ac.destination);
    _musicGain=_ac.createGain();_musicGain.gain.value=_musicVol;_musicGain.connect(_mGain);
    _sfxGain=_ac.createGain();_sfxGain.gain.value=_sfxVol;_sfxGain.connect(_mGain);
  }
  if(_ac.state==='suspended')_ac.resume();return _ac;
}
function _tone(freq,type,dur,vol,atk,dest){atk=atk||0.008;var c=ac(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(vol,c.currentTime+atk);g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+dur);o.connect(g);g.connect(dest||_sfxGain);o.start();o.stop(c.currentTime+dur+0.05);}
function _noise(dur,vol,lpFreq,dest){var c=ac(),buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate),d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;var src=c.createBufferSource();src.buffer=buf;var lp=c.createBiquadFilter();lp.type='lowpass';lp.frequency.value=lpFreq;var g=c.createGain();g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+dur);src.connect(lp);lp.connect(g);g.connect(dest||_sfxGain);src.start();src.stop(c.currentTime+dur);}
function _sweep(f0,f1,type,dur,vol,dest){var c=ac(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.setValueAtTime(f0,c.currentTime);o.frequency.exponentialRampToValueAtTime(f1,c.currentTime+dur);g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+dur);o.connect(g);g.connect(dest||_sfxGain);o.start();o.stop(c.currentTime+dur+0.02);}
/* ── SFX cooldown helpers to prevent overlap ── */
var _sfxCooldowns={};
function _sfxCooldown(id,ms,fn){
  if(_sfxCooldowns[id])return;
  fn();
  _sfxCooldowns[id]=true;
  setTimeout(function(){delete _sfxCooldowns[id];},ms);
}

function sfx_jump(){if(!_sfxOn)return;_sfxCooldown('jump',120,function(){_sweep(210,500,'square',0.09,0.3);setTimeout(function(){_tone(880,'sine',0.055,0.1,0.003);},55);});}
function sfx_land(){if(!_sfxOn)return;_sfxCooldown('land',200,function(){_noise(0.055,0.15,500);_tone(72,'sine',0.065,0.17,0.002);});}
function sfx_death(){if(!_sfxOn)return;_sfxCooldown('death',600,function(){_noise(0.45,0.52,1300);_sweep(430,35,'sawtooth',0.42,0.4);setTimeout(function(){_noise(0.2,0.26,480);},75);setTimeout(function(){_tone(52,'sine',0.3,0.26,0.004);},95);setTimeout(function(){_noise(0.12,0.16,260);},195);});}
function sfx_win(){if(!_sfxOn)return;_sfxCooldown('win',3000,function(){var m=[523,659,784,1047,784,1047,1319];m.forEach(function(f,i){setTimeout(function(){_tone(f,'square',0.18,0.25,0.005);if(i===6){setTimeout(function(){_tone(1047,'square',0.55,0.28,0.01);_tone(1319,'square',0.55,0.2,0.01);_tone(1568,'square',0.55,0.14,0.01);_noise(0.3,0.12,4000);},55);}},i*95);});});}
function sfx_ping(){if(!_sfxOn)return;_sfxCooldown('ping',800,function(){_tone(1047,'sine',0.09,0.17,0.004);setTimeout(function(){_tone(1319,'sine',0.13,0.13,0.004);},72);});}
function sfx_click(){if(!_sfxOn)return;_sfxCooldown('click',80,function(){_tone(540,'square',0.04,0.1,0.002);});}
function sfx_blip(){if(!_sfxOn)return;_sfxCooldown('blip',300,function(){_tone(440,'square',0.05,0.09,0.002);});}
