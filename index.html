<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Runner v7</title>
<style>
body{margin:0;background:#000;color:white;font-family:Arial;text-align:center;overflow:hidden;}
h1{margin:10px;}
textarea{width:80%;max-width:500px;height:70px;border-radius:10px;border:none;padding:10px;resize:none;}
button{margin:6px;padding:10px 20px;border-radius:20px;border:none;font-weight:bold;cursor:pointer;background:linear-gradient(45deg,#00f5ff,#7b2ff7);color:white;}
canvas{display:block;margin:0 auto;background:linear-gradient(#111,#000);touch-action:none;}
#result{font-size:2rem;opacity:0;transition:opacity 1s ease;}
</style>
</head>
<body>

<h1>🚀 Vault Runner v7</h1>

<textarea id="itemInput" placeholder="Enter items separated by commas..."></textarea><br>
<button onclick="saveList()">Save List</button>
<button onclick="startGame()">Start Run</button>

<canvas id="game"></canvas>
<div id="result"></div>

<script>
let items=[];
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight*0.55;}
resize();
window.onresize=resize;

window.onload=()=>{
    const saved=localStorage.getItem("runnerItemsV7");
    if(saved){items=JSON.parse(saved);document.getElementById("itemInput").value=items.join(", ");}
};

function saveList(){
    const input=document.getElementById("itemInput").value;
    items=input.split(",").map(i=>i.trim()).filter(i=>i);
    if(items.length===0) return alert("Enter at least one item.");
    localStorage.setItem("runnerItemsV7",JSON.stringify(items));
    alert("List saved.");
}

let player,worldX,speed,playing;
let platforms=[],spikes=[];
let checkpointX,finishX,spawnX;
let jumpBuffer=0,coyoteTime=0;

function startGame(){
    if(items.length===0) return alert("Save list first.");
    document.getElementById("result").style.opacity=0;

    speed=5;
    worldX=0;
    spawnX=0;
    playing=true;
    jumpBuffer=0;
    coyoteTime=0;

    generateLevel();
    spawnPlayer(0);
    gameLoop();
}

function spawnPlayer(atWorldX){
    const groundY=canvas.height-100;
    player={x:150,y:groundY-40,w:40,h:40,vy:0,rotation:0,onGround:false};
    worldX=atWorldX;
}

function generateLevel(){
    platforms=[];
    spikes=[];
    const groundY=canvas.height-100;
    const levelLength=6500;
    let x=0;

    // Starting ground
    platforms.push({x:0,y:groundY,w:800,h:100});
    x=800;

    while(x<levelLength){
        let maxJump=playerJumpDistance();
        // tighter spacing for reachable jumps
        let gap=100 + Math.random()* (maxJump*0.4); // smaller gap
        let width=250 + Math.random()*100;
        let height=groundY-(Math.random()<0.4?60:0);

        platforms.push({x:x+gap,y:height,w:width,h:100});

        // spikes
        if(Math.random()<0.6){
            let count=Math.random()<0.5?1:2;
            for(let i=0;i<count;i++){
                spikes.push({x:x+gap+100+i*50,y:height,size:40});
            }
        }

        x+=gap+width;
    }

    checkpointX=levelLength/2;
    finishX=levelLength+300;
}

function playerJumpDistance(){
    let vy=-14; let g=0.8;
    let tUp=Math.abs(vy/g);
    let tTotal=tUp*2;
    return speed*tTotal*0.9;
}

function gameLoop(){
    if(!playing) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    worldX+=speed;

    player.vy+=0.8;
    player.y+=player.vy;
    player.onGround=false;

    platforms.forEach(p=>{
        let screenX=p.x-worldX;
        if(screenX>-p.w && screenX<canvas.width){
            ctx.fillStyle="#222";
            ctx.fillRect(screenX,p.y,p.w,p.h);
            if(player.x+player.w>screenX && player.x<screenX+p.w &&
               player.y+player.h>p.y && player.y+player.h<p.y+20 && player.vy>=0){
                player.y=p.y-player.h;
                player.vy=0;
                player.onGround=true;
                coyoteTime=8;
            }
        }
    });

    if(!player.onGround)coyoteTime--;
    if(jumpBuffer>0){
        if(player.onGround || coyoteTime>0){player.vy=-14;jumpBuffer=0;}
        jumpBuffer--;
    }

    player.rotation=player.onGround?0:player.rotation+0.15;
    ctx.save();
    ctx.translate(player.x+20,player.y+20);
    ctx.rotate(player.rotation);
    ctx.fillStyle="#00f5ff";
    ctx.fillRect(-20,-20,40,40);
    ctx.restore();

    spikes.forEach(s=>{
        let screenX=s.x-worldX;
        if(screenX>-50 && screenX<canvas.width){
            ctx.beginPath();
            ctx.moveTo(screenX,s.y);
            ctx.lineTo(screenX+s.size/2,s.y-s.size);
            ctx.lineTo(screenX+s.size,s.y);
            ctx.closePath();
            ctx.fillStyle="#ff3b3b";
            ctx.fill();

            if(player.x+10<screenX+s.size && player.x+player.w-10>screenX &&
               player.y+player.h> s.y-s.size) death();
        }
    });

    // checkpoint
    if(worldX>checkpointX) spawnX=checkpointX-200;

    // finish portal
    let portalX=finishX-worldX;
    if(portalX<canvas.width){
        ctx.fillStyle="#00ff88";
        ctx.beginPath();
        ctx.arc(portalX,canvas.height-140,30,0,Math.PI*2);
        ctx.fill();
        if(player.x+player.w>portalX-20) win();
    }

    requestAnimationFrame(gameLoop);
}

function jump(){jumpBuffer=8;}
function death(){playing=false;setTimeout(()=>{spawnPlayer(spawnX);playing=true;gameLoop();},700);}
function win(){playing=false;let randomItem=items[Math.floor(Math.random()*items.length)];document.getElementById("result").innerText="✨ "+randomItem+" ✨";document.getElementById("result").style.opacity=1;}

canvas.addEventListener("click",jump);
canvas.addEventListener("touchstart",e=>{e.preventDefault();jump();},{passive:false});
</script>

</body>
</html>
