<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Reactor Challenge</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #0f0f0f, #000);
    color: white;
    text-align: center;
    overflow: hidden;
}

h1 {
    margin-top: 15px;
}

textarea {
    width: 80%;
    max-width: 500px;
    height: 80px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    font-size: 1rem;
    resize: none;
}

button {
    margin: 10px;
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
}

#gameCanvas {
    margin-top: 20px;
    touch-action: manipulation;
}

#charges {
    font-size: 1.3rem;
    margin-top: 10px;
}

#result {
    font-size: 2.5rem;
    margin-top: 10px;
    opacity: 0;
    transition: opacity 0.8s ease;
}
</style>
</head>
<body>

<h1>⚡ Core Reactor Challenge ⚡</h1>

<textarea id="itemInput" placeholder="Enter items separated by commas..."></textarea><br>
<button onclick="saveList()">Save List</button>
<button onclick="startGame()">Start Challenge</button>

<div id="charges">Charges: 0 / 5</div>
<canvas id="gameCanvas" width="350" height="350"></canvas>
<div id="result"></div>

<script>
let items = [];
let charges = 0;
let angle = 0;
let speed = 0.05;
let playing = false;

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const center = canvas.width / 2;
const radius = 120;

const targetStart = Math.PI * 1.6;
const targetSize = 0.5;

window.onload = () => {
    const saved = localStorage.getItem("reactorItems");
    if (saved) {
        items = JSON.parse(saved);
        document.getElementById("itemInput").value = items.join(", ");
    }
    draw();
};

function saveList() {
    const input = document.getElementById("itemInput").value;
    items = input.split(",").map(i => i.trim()).filter(i => i.length > 0);
    if (items.length === 0) return alert("Enter at least one item.");
    localStorage.setItem("reactorItems", JSON.stringify(items));
    alert("List saved!");
}

function startGame() {
    if (items.length === 0) return alert("Save your list first.");
    charges = 0;
    document.getElementById("charges").innerText = "Charges: 0 / 5";
    document.getElementById("result").style.opacity = 0;
    playing = true;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Core
    ctx.beginPath();
    ctx.arc(center, center, 60, 0, Math.PI * 2);
    ctx.fillStyle = "#00ffff";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#00ffff";
    ctx.fill();
    ctx.shadowBlur = 0;

    // Target zone
    ctx.beginPath();
    ctx.arc(center, center, radius, targetStart, targetStart + targetSize);
    ctx.strokeStyle = "#00ff00";
    ctx.lineWidth = 10;
    ctx.stroke();

    // Moving arc
    ctx.beginPath();
    ctx.arc(center, center, radius, angle, angle + 0.4);
    ctx.strokeStyle = "#ffcc00";
    ctx.lineWidth = 10;
    ctx.stroke();

    if (playing) {
        angle += speed;
        if (angle > Math.PI * 2) angle = 0;
    }

    requestAnimationFrame(draw);
}

function checkHit() {
    if (!playing) return;

    let normalized = angle % (Math.PI * 2);
    let success = normalized >= targetStart && normalized <= targetStart + targetSize;

    if (success) {
        charges++;
        document.getElementById("charges").innerText = "Charges: " + charges + " / 5";
        speed += 0.01;
    }

    if (charges >= 5) {
        unlock();
        playing = false;
        speed = 0.05;
    }
}

function unlock() {
    const randomItem = items[Math.floor(Math.random() * items.length)];
    const result = document.getElementById("result");
    result.innerText = "✨ " + randomItem + " ✨";
    result.style.opacity = 1;
}

canvas.addEventListener("click", checkHit);
canvas.addEventListener("touchstart", function(e){
    e.preventDefault();
    checkHit();
}, {passive:false});
</script>

</body>
</html>
